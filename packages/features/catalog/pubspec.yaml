name: atlantis_catalog
description: Product catalog feature module
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Routing
  go_router: ^12.1.1
  
  # UI & Images
  cached_network_image: ^3.3.0
  
  # Local Packages
  atlantis_core:
    path: ../../core
  atlantis_domain:
    path: ../../domain
  atlantis_data:
    path: ../../data

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.1
  mocktail: ^1.0.1