publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # JSON & Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Utils
  equatable: ^2.0.5
  
  # Local Packages
  atlantis_core:
    path: ../core

dev_dependencies:
