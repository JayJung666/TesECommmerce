name: atlantis_data
description: Data layer with data sources and repository implementations
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & Networking
  dio: ^5.3.2
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  
  # JSON & Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # Utils
  equatable: ^2.0.5
  logger: ^2.0.2+1
  
  # Local Packages
  atlantis_core:
    path: ../core
  atlantis_domain:
    path: ../domain

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.1
  mocktail: ^1.0.1