name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        cache: true
    
    - name: Install dependencies
      run: |
        cd apps/mobile
        flutter pub get
        
    - name: Get dependencies for packages
      run: |
        for package in packages/*/; do
          if [ -f "$package/pubspec.yaml" ]; then
            echo "Getting dependencies for $package"
            cd "$package"
            flutter pub get
            cd - > /dev/null
          fi
        done
    
    - name: Generate code
      run: |
        cd apps/mobile
        flutter pub run build_runner build --delete-conflicting-outputs
    
    - name: Verify the generated files
      run: git diff --exit-code
      
    - name: Analyze project source
      run: |
        cd apps/mobile
        flutter analyze
    
    - name: Check formatting
      run: |
        cd apps/mobile
        dart format --output=none --set-exit-if-changed .
    
    - name: Run tests
      run: |
        cd apps/mobile
        flutter test --coverage
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: apps/mobile/coverage/lcov.info
        fail_ci_if_error: true

  build:
    runs-on: ubuntu-latest
    needs: test
    
    strategy:
      matrix:
        flavor: [dev, staging, prod]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        cache: true
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Install dependencies
      run: |
        cd apps/mobile
        flutter pub get
    
    - name: Generate code
      run: |
        cd apps/mobile
        flutter pub run build_runner build --delete-conflicting-outputs
    
    - name: Build APK
      run: |
        cd apps/mobile
        flutter build apk --flavor ${{ matrix.flavor }} -t lib/main_${{ matrix.flavor }}.dart
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: apk-${{ matrix.flavor }}
        path: apps/mobile/build/app/outputs/apk/${{ matrix.flavor }}/release/app-${{ matrix.flavor }}-release.apk